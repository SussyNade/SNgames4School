<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="error404Title">404 - Página Não Encontrada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/logosite/icon/16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logosite/icon/32x32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/logosite/icon/64x64.png">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
      background-color: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    .error-container {
      max-width: 600px;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-404 {
      margin-bottom: 40px;
    }
    .logo-404 .logo {
      font-size: 48px;
    }
    .error-code {
      font-size: clamp(80px, 15vw, 150px);
      font-weight: 900;
      color: var(--accent);
      margin: 0;
      line-height: 1;
      letter-spacing: -5px;
    }
    .error-message {
      font-size: 24px;
      margin: 20px 0 10px;
      font-weight: bold;
    }
    .error-sub {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .back-button {
      display: inline-block;
      padding: 14px 36px;
      background-color: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 18px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 15px var(--shadow);
    }
    .back-button:hover {
      background-color: var(--accent2);
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }
    .back-button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="logo-404">
      <span class="logo">SN<span>Games</span></span>
    </div>
    
    <h1 class="error-code">404</h1>
    
    <p class="error-message" data-i18n="error404Message">Ops! Este jogo fugiu do mapa (ou a página sumiu).</p>
    <p class="error-sub" data-i18n="error404Sub">Game Over! Parece que você tentou acessar um nível que não existe.</p>
    
    <a href="index.html" class="back-button" data-i18n="backHome">Voltar ao Início</a>
  </div>

  <script src="translations.js"></script>
  <script>
    // Apply theme from localStorage
    const temaSalvo = localStorage.getItem('tema') || 'dark';
    document.documentElement.setAttribute('data-theme', temaSalvo);
    
    // The translations.js script will handle the content translation automatically 
    // on DOMContentLoaded because it's included before this block and has an event listener.
  </script>
</body>
</html>
