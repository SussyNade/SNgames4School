<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGames</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <span class="logo">SN<span>Games</span></span>
  <input type="text" class="search" placeholder="🔍 Buscar jogos..." id="searchInput" oninput="buscar()">
</nav>

<div id="search-results" class="search-results hidden"></div>

<main id="main-content">

  <section class="hero">
    <h1>Bem vindo ao SNGames</h1>
    <p>Jogue direto no navegador, sem instalar nada</p>
  </section>

  <div class="categoria"><div class="cat-header"><h2>🔥 Em Alta</h2></div><div class="row" id="row-alta"></div></div>
  <div class="categoria"><div class="cat-header"><h2>⭐ Mais Populares</h2></div><div class="row" id="row-populares"></div></div>
  <div class="categoria"><div class="cat-header"><h2>👥 Jogar com Amigos</h2></div><div class="row" id="row-amigos"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🌐 Jogos .io</h2></div><div class="row" id="row-io"></div></div>
  <div class="categoria"><div class="cat-header"><h2>💥 Ação</h2></div><div class="row" id="row-acao"></div></div>
  <div class="categoria"><div class="cat-header"><h2>📚 Educacional</h2></div><div class="row" id="row-edu"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🧩 Puzzle</h2></div><div class="row" id="row-puzzle"></div></div>
  <div class="categoria"><div class="cat-header"><h2>😎 Casual</h2></div><div class="row" id="row-casual"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🎵 Ritmo</h2></div><div class="row" id="row-ritmo"></div></div>
  <div class="categoria"><div class="cat-header"><h2>♟️ Estratégia</h2></div><div class="row" id="row-estrategia"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🎨 Criatividade</h2></div><div class="row" id="row-criatividade"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🍬 Doce</h2></div><div class="row" id="row-doce"></div></div>
  <div class="categoria"><div class="cat-header"><h2>⚡ Clássicos Flash</h2></div><div class="row" id="row-flash"></div></div>
  <div class="categoria"><div class="cat-header"><h2>🎮 Todos os Jogos</h2></div><div class="grid" id="grid-todos"></div></div>

</main>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button onclick="fecharModal()">✕</button>
    </div>
    <div class="grid" id="modal-grid"></div>
  </div>
</div>

<script src="rating_system.js"></script>
<script src="jogos.js"></script>
<script>
function linkJogo(jogo) {
  return `game.html?title=${encodeURIComponent(jogo.nome)}&type=${jogo.type}&url=${encodeURIComponent(jogo.url)}&thumb=${encodeURIComponent(jogo.thumb)}&tags=${encodeURIComponent(jogo.tags.join(","))}`;
}

function criarCard(jogo) {
  const rating = getRatingHTML(jogo.rating, jogo.sistema || "BR");
  return `
    <a href="${linkJogo(jogo)}" class="card">
      <div class="thumb-wrapper">
        <img src="${jogo.thumb}" alt="${jogo.nome}">
        ${rating}
      </div>
      <p>${jogo.nome}${jogo.type === 'external' ? ' ↗' : ''}</p>
    </a>
  `;
}

function preencherRow(id, tag, limite = 10) {
  const filtrados = jogos.filter(j => j.tags.includes(tag));
  const mostrar = filtrados.slice(0, limite);
  const row = document.getElementById(id);
  mostrar.forEach(j => { row.innerHTML += criarCard(j); });
  if (filtrados.length > limite) {
    const btn = document.createElement('div');
    btn.className = 'ver-todos-card';
    btn.onclick = () => abrirModal(tag);
    btn.innerHTML = `<span>Ver todos<br>(${filtrados.length})</span>`;
    row.appendChild(btn);
  }
}

function abrirModal(tag) {
  const titulos = {
    alta: "🔥 Em Alta", populares: "⭐ Mais Populares", amigos: "👥 Jogar com Amigos",
    io: "🌐 Jogos .io", acao: "💥 Ação", edu: "📚 Educacional", puzzle: "🧩 Puzzle",
    casual: "😎 Casual", ritmo: "🎵 Ritmo", estrategia: "♟️ Estratégia",
    criatividade: "🎨 Criatividade", doce: "🍬 Doce", flash: "⚡ Clássicos Flash"
  };
  const filtrados = jogos.filter(j => j.tags.includes(tag));
  document.getElementById('modal-title').textContent = titulos[tag] || tag;
  document.getElementById('modal-grid').innerHTML = filtrados.map(criarCard).join('');
  document.getElementById('modal').classList.remove('hidden');
}

function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

function buscar() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const results = document.getElementById('search-results');
  const main = document.getElementById('main-content');
  if (!q) { results.classList.add('hidden'); main.classList.remove('hidden'); return; }
  const filtrados = jogos.filter(j => j.nome.toLowerCase().includes(q));
  main.classList.add('hidden');
  results.classList.remove('hidden');
  results.innerHTML = filtrados.length === 0
    ? '<p class="sem-resultado">Nenhum jogo encontrado 😢</p>'
    : `<div class="grid">${filtrados.map(criarCard).join('')}</div>`;
}

preencherRow('row-alta', 'alta');
preencherRow('row-populares', 'populares');
preencherRow('row-amigos', 'amigos');
preencherRow('row-io', 'io');
preencherRow('row-acao', 'acao');
preencherRow('row-edu', 'edu');
preencherRow('row-puzzle', 'puzzle');
preencherRow('row-casual', 'casual');
preencherRow('row-ritmo', 'ritmo');
preencherRow('row-estrategia', 'estrategia');
preencherRow('row-criatividade', 'criatividade');
preencherRow('row-doce', 'doce');
preencherRow('row-flash', 'flash');
document.getElementById('grid-todos').innerHTML = jogos.map(criarCard).join('');

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});
</script>

</body>
</html>
