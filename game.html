<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGames</title>
  <link rel="icon" type="image/png" sizes="16x16" href="assets/logosite/icon/16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logosite/icon/32x32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/logosite/icon/64x64.png">
  <style>
    :root {
      --bg:       #1a1a2e;
      --bg2:      #16213e;
      --bg3:      #0f3460;
      --bg4:      #1a4a7a;
      --accent:   #e94560;
      --accent2:  #c73652;
      --text:     white;
      --shadow:   rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg:       #f0f2f8;
      --bg2:      #ffffff;
      --bg3:      #dce3f0;
      --bg4:      #c5d0e8;
      --accent:   #e94560;
      --accent2:  #c73652;
      --text:     #1a1a2e;
      --shadow:   rgba(0,0,0,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg); color: var(--text); font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .navbar { position: relative; z-index: 100; background: var(--bg2); padding: 12px 24px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 10px var(--shadow); flex-shrink: 0; }
    .logo { font-size: 22px; font-weight: bold; white-space: nowrap; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .voltar { color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.7; white-space: nowrap; }
    .voltar:hover { opacity: 1; }
    .separador { opacity: 0.3; }
    .game-nome { font-weight: bold; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .game-area { flex: 1; background: black; position: relative; overflow: hidden; }
    .game-area iframe { width: 100%; height: 100%; border: none; display: block; }
    .external-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px; text-align: center; height: 100%; background: var(--bg); }
    .external-screen img { width: 160px; height: 160px; object-fit: cover; border-radius: 12px; }
    .external-screen h2 { font-size: 28px; }
    .external-screen p { opacity: 0.6; font-size: 14px; }
    .play-btn { background: var(--accent); color: var(--text); text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 18px; font-weight: bold; transition: background 0.2s; }
    .play-btn:hover { background: var(--accent2); }
    .sidebar { width: 220px; background: var(--bg2); overflow-y: auto; flex-shrink: 0; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar h3 { font-size: 13px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; padding: 4px 0; }
    .sidebar-card { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); background: var(--bg3); border-radius: 8px; padding: 8px; transition: background 0.2s; }
    .sidebar-card:hover { background: var(--bg4); }
    .sidebar-card img:not(.rating-badge) { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.sidebar-thumb { position: relative; width: 48px; height: 48px; flex-shrink: 0; border-radius: 6px; overflow: hidden; }
.sidebar-thumb > img:not(.rating-badge) { width: 100%; height: 100%; object-fit: cover; display: block; }
.sidebar-thumb .rating-badge { position: absolute; width: 16px; height: 16px; bottom: 2px; right: 2px; }
    .sidebar-card span { font-size: 13px; line-height: 1.3; }

    /* AVISO FIREFOX */
    .firefox-aviso {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 999; display: flex; align-items: center; justify-content: center;
    }
    .firefox-aviso.hidden { display: none; }
    .firefox-box {
      background: var(--bg2); border-radius: 12px; padding: 32px; max-width: 400px;
      text-align: center; display: flex; flex-direction: column; gap: 16px;
    }
    .firefox-box h2 { font-size: 20px; }
    .firefox-box p { opacity: 0.7; font-size: 14px; line-height: 1.5; }
    .firefox-btns { display: flex; flex-direction: column; gap: 10px; }
    .firefox-btns a, .firefox-btns button {
      padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold;
      cursor: pointer; text-decoration: none; border: none;
    }
    .btn-nova-guia { background: var(--accent); color: var(--text); }
    .btn-nova-guia:hover { background: var(--accent2); }
    .btn-continuar { background: var(--bg3); color: var(--text); }
    .btn-continuar:hover { background: var(--bg4); }
    .tema-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      margin-left: auto;
      padding: 4px;
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="firefox-aviso hidden" id="firefox-aviso">
  <div class="firefox-box">
    <h2>⚠️ Problema no Firefox</h2>
    <p>Este jogo tem problemas de controle no Firefox (movimento de câmera com mouse). O que deseja fazer?</p>
    <div class="firefox-btns">
      <a id="btn-nova-guia" href="#" target="_blank" class="btn-nova-guia">Abrir em nova guia ↗</a>
      <button class="btn-continuar" onclick="continuarAssim()">Continuar assim mesmo</button>
    </div>
  </div>
</div>

<nav class="navbar">
  <a href="https://sussynade.github.io/SNgames/" class="logo">SN<span>Games</span></a>
  <a href="https://sussynade.github.io/SNgames/" class="voltar">← Voltar</a>
  <span class="separador">|</span>
  <span class="game-nome" id="game-title">Carregando...</span>
  <button class="tema-btn" onclick="toggleTema()" id="tema-btn" title="Alternar tema">🌙</button>
</nav>

<div class="main">
  <div class="game-area" id="game-area"></div>
  <div class="sidebar">
    <h3>Jogar depois</h3>
    <div id="sidebar-jogos"></div>
  </div>
</div>

<script src="rating_system.js"></script>
<script src="jogos.js"></script>
<script>
function linkJogo(jogo) {
  return `game.html?title=${encodeURIComponent(jogo.nome)}&type=${jogo.type}&url=${encodeURIComponent(jogo.url)}&thumb=${encodeURIComponent(jogo.thumb)}&tags=${encodeURIComponent(jogo.tags.join(','))}`;
}

const params = new URLSearchParams(window.location.search);
const title = params.get("title") || "Jogo";
const type = params.get("type") || "iframe";
const url = params.get("url") || "";
const thumb = params.get("thumb") || "";
const tagsAtual = (params.get("tags") || "").split(',').filter(Boolean);

document.getElementById("game-title").textContent = title;
document.title = title + " - SNGames";

// detecta jogo atual
const jogoAtual = jogos.find(j => j.url === decodeURIComponent(url));
const isFirefox = navigator.userAgent.toLowerCase().includes('firefox');

function carregarJogo() {
  const area = document.getElementById("game-area");
  if (type === "iframe" || type === "self") {
    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.allowFullscreen = true;
    iframe.allow = "pointer-lock; fullscreen";
    area.appendChild(iframe);
  } else {
    area.innerHTML = `
      <div class="external-screen">
        ${thumb ? `<img src="${thumb}" alt="${title}">` : ""}
        <h2>${title}</h2>
        <p>Este jogo é hospedado em um site externo.</p>
        <a href="${url}" target="_blank" class="play-btn">Jogar ↗</a>
      </div>
    `;
  }
}

function continuarAssim() {
  document.getElementById('firefox-aviso').classList.add('hidden');
  carregarJogo();
}

// mostra aviso se firefox + jogo com problema
if (isFirefox && jogoAtual && jogoAtual.firefoxWarn) {
  document.getElementById('firefox-aviso').classList.remove('hidden');
  document.getElementById('btn-nova-guia').href = url;
} else {
  carregarJogo();
}

// sidebar
const recomendados = jogos
  .filter(j => j.url !== decodeURIComponent(url))
  .sort((a, b) => {
    const commonA = a.tags.filter(t => tagsAtual.includes(t)).length;
    const commonB = b.tags.filter(t => tagsAtual.includes(t)).length;
    return commonB - commonA;
  });

document.getElementById("sidebar-jogos").innerHTML = recomendados.map(j => `
  <a href="${linkJogo(j)}" class="sidebar-card">
    <div class="thumb-wrapper sidebar-thumb">
      <img src="${j.thumb}" alt="${j.nome}">
      ${getRatingHTML(j.rating, j.sistema || "BR")}
    </div>
    <span>${j.nome}${j.type === 'external' ? ' ↗' : ''}</span>
  </a>
`).join('');
</script>


<script>
function aplicarTema(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  document.getElementById('tema-btn').textContent = tema === 'light' ? '🌙' : '☀️';
  localStorage.setItem('tema', tema);
}
function toggleTema() {
  const atual = document.documentElement.getAttribute('data-theme') || 'dark';
  aplicarTema(atual === 'dark' ? 'light' : 'dark');
}
const temaSalvo = localStorage.getItem('tema') || 'dark';
aplicarTema(temaSalvo);
</script>
</body>
</html>
